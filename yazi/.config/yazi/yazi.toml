[mgr]
show_hidden = true
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_symlink = true
scrolloff = 5
title_format = "Yazi: {cwd}"

[preview]
tab_size = 2
max_width = 1200
max_height = 1800

[opener]
play = [
	{ run = 'mpv "%1"', orphan = true, desc = "Play", for = "unix" },
]
open = [
	{ run = 'xdg-open "%1"', orphan = true, desc = "Open", for = "unix" },
]
extract = [
	{ run = 'ya pub extract --list %s', desc = "Extract here" },
]

[open]
prepend_rules = [
	{ mime = "video/*", use = "play" },
	{ url = "*.md", use = "open" },
]
append_rules = [
	{ url = "*", use = "open" },
]

[plugin]
prepend_previewers = [
	{ url = "*.md", run = "glow" },
]
