[mgr]
show_hidden = true
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "none"
show_symlink = true
scrolloff = 5

[preview]
tab_size = 2
max_width = 1200
max_height = 1800

[opener]
play = [
	{ run = 'mpv "%1"', orphan = true, desc = "Play", for = "unix" },
]

[open]
prepend_rules = [
	{ mime = "video/*", use = "play" },
]
