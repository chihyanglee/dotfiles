########################
# Export GTK dark theme to systemd so xdg-desktop-portal-gtk picks it up
########################

exec-once = systemctl --user import-environment GTK_THEME && systemctl --user restart xdg-desktop-portal-gtk

########################
# Notifications
########################

exec-once = uwsm app -- mako

########################
# Wallpaper daemon
########################

exec-once = uwsm app -- awww-daemon

########################
# EWW widgets
########################

exec-once = uwsm app -- sh -c 'pkill eww || true; eww daemon; sleep 1; eww open bar'

########################
# Input method
########################

exec-once = uwsm app -- fcitx5
