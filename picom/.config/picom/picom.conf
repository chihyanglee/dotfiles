# Backend
backend = "glx";
vsync = true;

# Shadows
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.75;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-exclude = [
    "class_g = 'i3-frame'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# Opacity
inactive-opacity = 0.95;
frame-opacity = 0.9;

opacity-rule = [
    "95:class_g = 'kitty' && focused",
    "85:class_g = 'kitty' && !focused"
];

# Other
mark-wmwin-focused = true;
mark-overdir-focused = true;
detect-client-opacity = true;
detect-rounded-corners = true;
