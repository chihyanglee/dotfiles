source = ~/.config/hypr/hyprlock-theme.conf

general {
    hide_cursor = true
    grace = 3
}

# Dark blurred backdrop
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 10
    brightness = 0.4
    noise = 0.02
    vibrancy = 0.1
}

#########################
# HUD — top left status
#########################

# System identifier
label {
    monitor =
    text = cmd[update:0] echo "[ $(hostname) ]"
    color = $lock_tertiary
    font_size = 11
    font_family = JetBrains Mono
    halign = left
    valign = top
    position = 40, -30
}

# Uptime
label {
    monitor =
    text = cmd[update:60000] echo "UP $(uptime -p | sed 's/up //')"
    color = $lock_dim
    font_size = 11
    font_family = JetBrains Mono
    halign = left
    valign = top
    position = 40, -52
}

# Date — top right
label {
    monitor =
    text = cmd[update:3600000] date +"%Y.%m.%d // %A"
    color = $lock_dim
    font_size = 11
    font_family = JetBrains Mono
    halign = right
    valign = top
    position = -40, -30
}

#########################
# Hero — big clock center
#########################

label {
    monitor =
    text = $TIME12
    color = $lock_fg
    font_size = 140
    font_family = JetBrains Mono ExtraBold
    halign = center
    valign = center
    position = 0, 80

    shadow_passes = 2
    shadow_size = 12
    shadow_boost = 0.4
}

# Separator line (using unicode)
label {
    monitor =
    text = ━━━━━━━━━━━━━━━━━━━━━━
    color = $lock_outline_variant
    font_size = 14
    font_family = JetBrains Mono
    halign = center
    valign = center
    position = 0, -10
}

# Status text
label {
    monitor =
    text = SYSTEM LOCKED
    color = $lock_tertiary
    font_size = 12
    font_family = JetBrains Mono
    halign = center
    valign = center
    position = 0, -40
}

#########################
# Input — bottom center
#########################

# Input label
label {
    monitor =
    text = AUTHENTICATE >
    color = $lock_dim
    font_size = 11
    font_family = JetBrains Mono
    halign = center
    valign = bottom
    position = 0, 170
}

input-field {
    monitor =
    size = 320, 45
    outline_thickness = 2
    rounding = 4
    dots_size = 0.2
    dots_spacing = 0.3
    outer_color = $lock_outline_variant
    inner_color = $lock_surface_container
    font_color = $lock_fg
    fade_on_empty = true
    placeholder_text = <span font_family="JetBrains Mono" font_size="10pt">_</span>
    fail_color = $lock_error
    fail_text = <span font_family="JetBrains Mono" font_size="10pt">ACCESS DENIED</span>
    halign = center
    valign = bottom
    position = 0, 100
}

# Bottom bar — user + session
label {
    monitor =
    text = cmd[update:0] echo "$USER@$(hostname) // hyprland"
    color = $lock_dim
    font_size = 10
    font_family = JetBrains Mono
    halign = center
    valign = bottom
    position = 0, 50
}
